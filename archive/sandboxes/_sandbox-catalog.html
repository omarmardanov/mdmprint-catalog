<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Песочница · Каталог-рельса (мобилка)</title>
<link rel="stylesheet" href="../assets/css/fonts.css">
<link rel="stylesheet" href="../assets/css/tokens.css">
<link rel="stylesheet" href="../assets/css/kit.css">
<style>
  body{margin:0;background:#d9d3c9;color:var(--text-primary);font-family:var(--font-body);
    display:flex;gap:28px;justify-content:center;align-items:flex-start;padding:28px;flex-wrap:wrap}
  .col{width:412px}
  .col h3{font-family:var(--font-head);text-transform:uppercase;font-size:15px;color:#4a4235;margin:0 0 10px;text-align:center}
  .phone{background:var(--surface-page);border-radius:18px;overflow:hidden;box-shadow:0 20px 50px -20px rgba(0,0,0,.4)}

  .cat-lbl{padding:16px 16px 6px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-tertiary)}
  .cat-row{display:flex;align-items:center;gap:14px;width:100%;padding:12px 16px;min-height:56px;
    border:0;border-bottom:1px solid var(--border);background:none;color:var(--text-primary);cursor:pointer;text-align:left}
  .cat-row:active{background:var(--surface-subtle)}
  .cat-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .cat-title{font-size:15px;font-weight:500;color:var(--text-primary);line-height:1.25}
  .cat-desc{font-size:12.5px;line-height:1.3;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cat-arr{margin-left:auto;flex-shrink:0;color:var(--text-tertiary);display:flex}
  .cat-arr svg{width:9px;height:14px}

  /* вариант 1 — голая иконка */
  .v1 .cat-em{width:26px;flex-shrink:0;color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
  .v1 .cat-em svg{width:24px;height:24px}
  /* вариант 2 — иконка в тональной плашке */
  .v2 .cat-em{width:42px;height:42px;flex-shrink:0;border-radius:var(--radius-md);background:var(--surface-subtle);
    color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
  .v2 .cat-em svg{width:23px;height:23px}
</style>
</head>
<body>
<script>
  const CATS = [
    ['<rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M7 14h5M7 10.5h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>','Визитки','Матовые, тиснение, скруглённые, пластик'],
    ['<path d="M7 9V4h10v5M7 18H5a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-2M7 15h10v5H7z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>','Печать полиграфии','Листовки, буклеты, папки, календари'],
    ['<rect x="3" y="5" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="m6 14 3.5-4 2.5 3 2-2.5L18 14" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>','Широкоформатная печать','Баннеры, интерьерная, конструкции'],
    ['<rect x="12.4" y="5.5" width="8.5" height="13" rx="1.8" transform="rotate(12 16.6 12)" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><rect x="4" y="5" width="9.5" height="14.5" rx="1.8" fill="var(--surface-page)" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M8.7 9.6 10 11.3 8.7 13 7.4 11.3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>','Карты и настольные игры','Игральные карты, настольные игры'],
    ['<path d="M12 21a9 9 0 1 1 9-9c0 1-1.2 2.2-3 4l-2 2c-1.8 1.8-3 3-4 3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M21 12c-3.3 0-5.6.8-7 2.2S12 18 12 21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>','Наклейки, стикеры, этикетки','Печать наклеек, этикетки на товар'],
    ['<path d="M12 3 4 7v10l8 4 8-4V7zM4 7l8 4 8-4M12 11v10" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>','Упаковка и коробки','Кашированные, из картона, из МГК'],
    ['<path d="M4 8h16v3H4zM5 11h14v9H5zM12 8v12M12 8S10.5 3 8 4.5 9.5 8 12 8ZM12 8s1.5-5 4-3.5S14.5 8 12 8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>','Сувениры и мерч','Корпоративный мерч, с логотипом, наборы'],
  ];
  const arr = '<span class="cat-arr"><svg viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
  function rows(showDesc){
    return CATS.map(c=>`<button class="cat-row"><span class="cat-em"><svg viewBox="0 0 24 24" fill="none">${c[0]}</svg></span><span class="cat-tx"><span class="cat-title">${c[1]}</span>${showDesc?`<span class="cat-desc">${c[2]}</span>`:''}</span>${arr}</button>`).join('');
  }
  document.write(`
    <div class="col">
      <h3>Вариант 1 · иконка голая + подсказка</h3>
      <div class="phone v1"><div class="cat-lbl">Каталог</div>${rows(true)}</div>
    </div>
    <div class="col">
      <h3>Вариант 2 · иконка в плашке + подсказка</h3>
      <div class="phone v2"><div class="cat-lbl">Каталог</div>${rows(true)}</div>
    </div>
    <div class="col">
      <h3>Для сравнения · как сейчас (без подсказки)</h3>
      <div class="phone v1"><div class="cat-lbl">Каталог</div>${rows(false)}</div>
    </div>
  `);
</script>
</body>
</html>
