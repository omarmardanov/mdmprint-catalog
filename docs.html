<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MDMprint — документация</title>
<link rel="stylesheet" href="assets/css/fonts.css?v=20260722a">
<link rel="stylesheet" href="assets/css/tokens.css?v=20260722a">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);color:var(--text-primary);background:var(--surface-subtle);
    -webkit-font-smoothing:antialiased;line-height:1.6}
  .bar{position:sticky;top:0;z-index:5;background:var(--surface-card);border-bottom:1px solid var(--border);
    padding:12px 20px;display:flex;align-items:center;gap:14px;font-size:13px}
  .bar a{color:var(--text-secondary);text-decoration:none}
  .bar a:hover{color:var(--text-primary)}
  .bar .cur{color:var(--text-primary);font-weight:600}
  .doc{max-width:820px;margin:0 auto;padding:36px 24px 100px}

  /* типографика markdown */
  .doc h1{font-family:var(--font-head);font-size:28px;line-height:34px;margin:8px 0 18px}
  .doc h2{font-family:var(--font-head);font-size:20px;line-height:26px;margin:30px 0 12px;
    padding-top:18px;border-top:1px solid var(--border)}
  /* hr прямо перед h2 избыточен — h2 уже несёт свою линию сверху */
  .doc hr + h2{border-top:0;padding-top:0;margin-top:6px}
  .doc h3{font-family:var(--font-head);font-size:16px;line-height:22px;margin:24px 0 8px}
  .doc h4{font-size:14px;font-weight:700;margin:18px 0 6px}
  .doc p{margin:12px 0}
  .doc ul,.doc ol{margin:12px 0 12px 24px}
  .doc li{margin:5px 0}
  .doc li>ul,.doc li>ol{margin:5px 0 5px 20px}
  .doc a{color:var(--brand-text);text-decoration:underline;text-underline-offset:2px}
  .doc a:hover{color:var(--text-primary)}
  .doc strong{font-weight:700;color:var(--text-primary)}
  .doc code{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:.88em;
    background:var(--surface-on-light);border-radius:4px;padding:1px 5px}
  .doc pre{background:var(--surface-dark);color:var(--text-on-dark);border-radius:10px;
    padding:16px 18px;overflow-x:auto;margin:16px 0;line-height:1.5}
  .doc pre code{background:none;padding:0;font-size:13px;color:inherit}
  .doc blockquote{border-left:3px solid var(--brand);background:var(--surface-card);
    border-radius:0 8px 8px 0;padding:12px 16px;margin:16px 0;color:var(--text-secondary)}
  .doc blockquote p{margin:6px 0}
  .doc blockquote strong{color:var(--text-primary)}
  .doc hr{border:0;border-top:1px solid var(--border);margin:28px 0}
  .doc table{border-collapse:collapse;width:100%;margin:16px 0;font-size:14px;display:block;overflow-x:auto}
  .doc th,.doc td{border:1px solid var(--border);padding:8px 12px;text-align:left;vertical-align:top}
  .doc th{background:var(--surface-on-light);font-weight:700;white-space:nowrap}
  .doc tr:nth-child(even) td{background:var(--surface-card)}
  .loading,.err{color:var(--text-secondary);padding:40px 0}
  .err{color:var(--danger)}
</style>
</head>
<body>
<div class="bar">
  <a href="index.html">← Все прототипы</a>
  <span class="cur" id="crumb">Документация</span>
</div>
<article class="doc" id="doc"><p class="loading">Загрузка…</p></article>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
  // безопасность: имя файла только [\w.-], без слэшей → нет выхода за docs/
  const raw = new URLSearchParams(location.search).get('doc') || 'BRIEF_PM.md';
  const file = raw.replace(/[^\w.-]/g,'');
  const el = document.getElementById('doc');
  document.getElementById('crumb').textContent = file;
  document.title = 'MDMprint — ' + file;

  fetch('docs/' + file)
    .then(r => { if(!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => {
      if(window.marked){
        marked.setOptions({gfm:true, breaks:false});
        el.innerHTML = marked.parse(md);
      } else {
        // фолбэк без библиотеки — хотя бы моноширинный сырой текст
        const pre = document.createElement('pre'); pre.textContent = md; el.innerHTML=''; el.appendChild(pre);
      }
    })
    .catch(e => { el.innerHTML = '<p class="err">Не удалось загрузить <code>docs/'+file+'</code> ('+e.message+').</p>'; });
</script>
</body>
</html>
