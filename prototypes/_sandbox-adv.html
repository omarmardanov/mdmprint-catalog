<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Песочница · Преимущества (мобилка)</title>
<link rel="stylesheet" href="../assets/css/fonts.css">
<link rel="stylesheet" href="../assets/css/tokens.css">
<link rel="stylesheet" href="../assets/css/kit.css">
<style>
  body{margin:0;padding:24px;background:#d9d3c9;font-family:var(--font-body);color:var(--text-primary);
    display:flex;gap:20px;align-items:flex-start}
  .col{width:390px}
  .col > h3{font-family:var(--font-head);text-transform:uppercase;font-size:14px;color:#4a4235;margin:0 0 4px;text-align:center}
  .col > .note{font-size:12px;color:#5c5346;text-align:center;margin:0 0 10px;min-height:32px}
  .phone{background:var(--surface-page);border-radius:16px;overflow:hidden;padding:16px}
  h2{font-family:var(--font-head);font-size:24px;line-height:28px;letter-spacing:.02em;text-transform:uppercase;margin:0 0 20px}

  /* A · сетка 2×2 — как предложил Omar */
  .a .tiles{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-16)}

  /* B · карусель */
  .b .tiles{display:flex;gap:var(--sp-12);overflow-x:auto;scroll-snap-type:x mandatory;
    margin-inline:-16px;padding-inline:16px}
  .b .mk-tile{flex:0 0 78%;scroll-snap-align:start}

  /* C · компактный столбец: иконка в строку с заголовком */
  .c .tiles{display:flex;flex-direction:column;gap:var(--sp-12)}
  .c .mk-tile{display:grid;grid-template-columns:auto 1fr;gap:var(--sp-8) var(--sp-10);align-items:center}
  .c .mk-tile__title{grid-column:2}
  .c .mk-tile__text{grid-column:1/-1}
</style>
</head>
<body>
<script>
  const TILES = [
    ['Премиальный вид','Мгновенно поднимает статус изделия — считывается как «дорого» ещё до прочтения.'],
    ['Тактильность','Фольгу и рельеф чувствуешь на ощупь. Изделие хочется взять в руки.'],
    ['Стойкость','Не выцветает и не стирается — эффект держится весь срок службы.'],
    ['Контраст на тёмном','Металлик ярко работает там, где обычная краска почти не видна.'],
  ];
  const tiles = () => TILES.map(t=>`<div class="mk-tile"><span class="mk-tile__ico"></span><h3 class="mk-tile__title">${t[0]}</h3><p class="mk-tile__text">${t[1]}</p></div>`).join('');
  const screen = (cls, title, note) => `<div class="col ${cls}">
      <h3>${title}</h3><p class="note">${note}</p>
      <div class="phone"><h2>Преимущества тиснения</h2><div class="tiles">${tiles()}</div></div>
    </div>`;
  document.write(
    screen('a','A · сетка 2×2','как предложил Omar') +
    screen('b','B · карусель','свайп, 1.2 плитки в кадре') +
    screen('c','C · компактный столбец','иконка в строку с заголовком')
  );
</script>
<script>
  // меряем реальную меру строки в каждом варианте
  window.addEventListener('load',()=>{
    document.querySelectorAll('.col').forEach(col=>{
      const p = col.querySelector('.mk-tile__text');
      const w = p.getBoundingClientRect().width;
      const ch = Math.round(w / (parseFloat(getComputedStyle(p).fontSize) * 0.5));
      col.querySelector('.note').textContent += ` · мера ≈ ${ch} знаков`;
    });
  });
</script>
</body>
</html>
